<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Hanuman Sports</title>
        <meta name="theme-color" content="#00F0FF">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="logo.png" sizes="192x192">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00F0FF;
            --primary-light: rgba(0, 240, 255, 0.12);
            --secondary: #0A0E17;
            --accent: #00F0FF;
            --light: #F8F9FA;
            --dark: #212529;
            --white: #FFFFFF;
            --gray: #6C757D;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-shadow: 0 0 10px rgba(0, 240, 255, 0.7);
            --primary-shadow: 0 0 15px rgba(255, 107, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--secondary);
            color: var(--light);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(10, 14, 23, 0.9), rgba(10, 14, 23, 0.9)), 
                        url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .forgot-container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
            margin: 2rem;
        }

        .forgot-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo img {
            height: 80px;
            filter: drop-shadow(0 0 5px var(--primary));
        }

        .logo h1 {
            font-size: 2rem;
            color: var(--white);
            background: linear-gradient(to right, #ffffff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255, 107, 0, 0.3);
        }

        .logo p {
            font-size: 0.9rem;
            color: var(--gray);
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--accent);
            font-weight: 500;
        }

        .form-group .input-wrapper {
            position: relative;
            width: 100%;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            padding-right: 3rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            font-size: 1rem;
            transition: all 0.3s;
            line-height: 1.5;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(255, 107, 0, 0.3);
        }

        .form-group i {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 1.1rem;
            pointer-events: none;
            z-index: 2;
            line-height: 1;
        }
        
        .btn {
    width: 100%;
    padding: 1rem;
    border-radius: 30px;
    border: 1px solid var(--primary);
    background: rgba(0,240,255,0.15);
    color: var(--primary);
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(6px);
    box-shadow: 0 0 10px rgba(0,240,255,0.3);
}

.btn:hover {
    background: var(--primary);
    color: #000;
    box-shadow: 0 0 20px rgba(0,240,255,0.8);
    transform: translateY(-3px);
}

        .login-link {
            text-align: center;
            margin-top: 2rem;
            color: var(--gray);
        }

        .login-link a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.3s;
        }

        .login-link a:hover {
            color: var(--primary);
        }

        .success-message {
            display: none;
            background: rgba(0, 240, 255, 0.15);
            border: 1px solid rgba(0, 240, 255, 0.5);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            color: var(--accent);
            text-align: center;
            box-shadow: 0 0 10px rgba(0,240,255,0.4);
        }

        .success-message i {
            margin-right: 0.5rem;
            color: var(--accent);
            text-shadow: 0 0 8px rgba(0,240,255,0.7);
        }

        .instructions {
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        @media (max-width: 576px) {
            .forgot-container {
                padding: 2rem 1.5rem;
            }
            
            .logo img {
                height: 60px;
            }
            
            .logo h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <div class="logo">
            <img src="logo.png" alt="Hanuman Sports Logo">
            <h1>Hanuman Sports</h1>
            <p>Mysore's Premier Sports Destination</p>
        </div>

        <div class="instructions">
            Enter your email address and we'll send you instructions to reset your password.
        </div>

        <div class="success-message" id="success-message">
            <i class="fas fa-check-circle"></i>
            <span>Password reset instructions have been sent to your email!</span>
        </div>

        <form id="forgotPasswordForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" required placeholder="Enter your registered email">
                    <i class="fas fa-envelope"></i>
                </div>
            </div>

            <button type="submit" class="btn">Send Reset Instructions</button>

            <div class="login-link">
                Remember your password? <a href="login.html">Back to Login</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            
            // In a real application, you would send this data to your server
            console.log('Password reset requested for:', email);
            
            // Show success message
            const successMessage = document.getElementById('success-message');
            successMessage.style.display = 'block';
            
            // Hide the form
            document.getElementById('forgotPasswordForm').style.display = 'none';
            
            // Hide success message after 5 seconds and redirect
            setTimeout(() => {
                successMessage.style.display = 'none';
                // Redirect to login page
                window.location.href = 'login.html';
            }, 5000);
        });
    </script>
</body>
</html>
