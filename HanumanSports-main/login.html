<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hanuman Sports</title>
        <meta name="theme-color" content="#00F0FF">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="logo.png" sizes="192x192">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #00F0FF;
            --primary-light: rgba(0, 240, 255, 0.12);
            --secondary: #0A0E17;
            --accent: #00F0FF;
            --light: #F8F9FA;
            --dark: #212529;
            --white: #FFFFFF;
            --gray: #6C757D;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-shadow: 0 0 12px rgba(0, 240, 255, 0.8);
            --primary-shadow: 0 0 18px rgba(0, 240, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--secondary);
            color: var(--light);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(10, 14, 23, 0.9), rgba(10, 14, 23, 0.9)),
                url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .login-container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
            margin: 2rem;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo img {
            height: 80px;
            filter: drop-shadow(0 0 5px var(--primary));
        }

        .logo h1 {
            font-size: 2rem;
            color: var(--white);
            background: linear-gradient(to right, #ffffff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255, 107, 0, 0.3);
        }

        .logo p {
            font-size: 0.9rem;
            color: var(--gray);
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        /* ADD THIS RIGHT HERE */
        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 1rem 80px 1rem 1rem;
        }

        .input-wrapper i {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }


        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--accent);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 1rem 60px 1rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            font-size: 1rem;
            transition: all 0.3s;
            height: 48px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(255, 107, 0, 0.3);
        }

        .form-group i {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 1rem;
        }

        /* Email icon (left icon of the two) */
        .icon-email {
            right: 45px;
        }

        /* Phone icon (rightmost icon) */
        .icon-phone {
            right: 15px;
        }

        .toggle-password {
            position: absolute;
            right: 20px;
            cursor: pointer;
        }


        .toggle-password:hover {
            color: var(--accent);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
        }

        .remember-me input {
            margin-right: 0.5rem;
        }

        .forgot-password a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.3s;
        }

        .forgot-password a:hover {
            color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 30px;
            border: 1px solid var(--primary);
            background: rgba(0, 240, 255, 0.15);
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(6px);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.8);
            transform: translateY(-3px);
        }

        .register-link {
            text-align: center;
            margin-top: 2rem;
            color: var(--gray);
        }

        .register-link a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.3s;
        }

        .register-link a:hover {
            color: var(--primary);
        }

        .social-login {
            margin-top: 2rem;
            text-align: center;
        }

        .social-login p {
            color: var(--gray);
            margin-bottom: 1rem;
            position: relative;
        }

        .social-login p::before,
        .social-login p::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: var(--glass-border);
        }

        .social-login p::before {
            left: 0;
        }

        .social-login p::after {
            right: 0;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .social-icons a {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 1.2rem;
            transition: all 0.3s;
            border: 1px solid var(--glass-border);
        }

        .social-icons a:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .social-icons a:nth-child(1) {
            background: #3b5998;
        }

        .social-icons a:nth-child(2) {
            background: #db4437;
        }

        .social-icons a:nth-child(3) {
            background: #1da1f2;
        }

        @media (max-width: 576px) {
            .login-container {
                padding: 2rem 1.5rem;
            }

            .logo img {
                height: 60px;
            }

            .logo h1 {
                font-size: 1.5rem;
            }
        }

        /* POPUP */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
            z-index: 9999;
        }

        .popup-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .popup-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.4);
            width: 320px;
        }

        .popup-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.4);
            width: 320px;

            /* ADD THESE */
            transform: scale(0.7);
            transition: 0.35s ease;
        }

        .popup-overlay.active .popup-box {
            transform: scale(1);
        }


        .success-icon {
            font-size: 60px;
            color: #00F0FF;
            margin-bottom: 15px;
        }

        .popup-box button {
            margin-top: 20px;
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            background: #00F0FF;
            color: #000;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo">
            <img src="logo.png" alt="Hanuman Sports Logo">
            <h1>Hanuman Sports</h1>
            <p>Mysore's Premier Sports Destination</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address or phone number</label>

                <div class="input-wrapper">
                    <input type="text" id="email" name="email" required>
                    <i class="fas fa-envelope icon-email"></i>
                    <i class="fas fa-phone icon-phone"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>

                <div class="input-wrapper">
                    <input type="password" id="password" name="password" required>
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>


            <div class="remember-forgot">
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                <div class="forgot-password">
                    <a href="forget-password.html" title="Recover your password">Forgot password?</a>
                </div>
            </div>

            <button type="submit" class="btn">Login</button>

            <div class="register-link">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </form>

        <div class="social-login">
            <p>Or login with</p>
            <div class="social-icons">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-google"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
            </div>
        </div>
    </div>

    <!-- LOGIN SUCCESS POPUP -->
    <div id="loginPopup" class="popup-overlay">
        <div class="popup-box">
            <i class="fas fa-check-circle success-icon"></i>
            <h2>Login Successful</h2>
            <p>Welcome back to Hanuman Sports</p>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const form = document.getElementById("loginForm");
            const popup = document.getElementById("loginPopup");

            console.log("Page Loaded. Form found:", !!form);

            form.addEventListener("submit", async function (e) {
                e.preventDefault();
                console.log("Button clicked! Attempting login...");

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                try {
                    const response = await fetch('http://localhost:3000/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    console.log("Response status:", response.status);
                    const data = await response.json();

                    if (response.ok) {
                        console.log("Login success! Role:", data.role);
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('role', data.role);

                        popup.classList.add("active");

                        setTimeout(() => {
                            window.location.href = (data.role === 'admin') ? 'admin.html' : 'profile.html';
                        }, 2000);
                    } else {
                        alert("Error: " + data.message);
                    }
                } catch (err) {
                    console.error("Connection Failed:", err);
                    alert("Server is not responding. Is node server.js running?");
                }
            });
        });

        const togglePassword = document.getElementById("togglePassword");
        const passwordField = document.getElementById("password");

        togglePassword.addEventListener("click", function () {
            if (passwordField.type === "password") {
                passwordField.type = "text";
                this.classList.remove("fa-eye");
                this.classList.add("fa-eye-slash");
            } else {
                passwordField.type = "password";
                this.classList.remove("fa-eye-slash");
                this.classList.add("fa-eye");
            }
        });
    </script>
</body>

</html>
