<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Hanuman Sports</title>
        <meta name="theme-color" content="#00F0FF">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="logo.png" sizes="192x192">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #00F0FF;
            --primary-light: rgba(0, 240, 255, 0.12);
            --secondary: #0A0E17;
            --accent: #00F0FF;
            --light: #F8F9FA;
            --dark: #212529;
            --white: #FFFFFF;
            --gray: #6C757D;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-shadow: 0 0 12px rgba(0, 240, 255, 0.8);
            --primary-shadow: 0 0 18px rgba(0, 240, 255, 0.6);
            --warning: #FF4D4D;
            --warning-glow: rgba(255, 77, 77, 0.6);
            --success: #00F0FF;
            --success-glow: rgba(0, 240, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--secondary);
            color: var(--light);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(10, 14, 23, 0.9), rgba(10, 14, 23, 0.9)),
                url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .register-container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 3rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
            margin: 2rem;
        }

        .register-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo img {
            height: 80px;
            filter: drop-shadow(0 0 5px var(--primary));
        }

        .logo h1 {
            font-size: 2rem;
            color: var(--white);
            background: linear-gradient(to right, #ffffff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            font-size: 0.9rem;
            color: var(--gray);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .full-width {
            grid-column: span 2;
        }

        .form-group {
            flex: 1;
            position: relative;
            width: 100%;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper input {
            width: 100%;
            height: 48px;
            min-width: 220px;
            padding: 0 60px 0 15px;
            border-radius: 8px;
        }

        .input-wrapper i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--accent);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        /* Shake animation for mismatched fields */
        .input-error {
            border-color: var(--warning) !important;
            box-shadow: 0 0 10px var(--warning-glow) !important;
            animation: shake 0.4s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        .form-group i {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
        }

        .toggle-password {
            cursor: pointer;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: var(--accent);
        }

        .terms {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .terms input {
            margin-right: 0.5rem;
        }

        .terms label {
            color: var(--gray);
            font-size: 0.9rem;
        }

        .terms a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.3s;
        }

        .terms a:hover {
            color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 30px;
            border: 1px solid var(--primary);
            background: rgba(0, 240, 255, 0.15);
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(6px);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.8);
            transform: translateY(-3px);
        }

        .login-link {
            text-align: center;
            margin-top: 2rem;
            color: var(--gray);
        }

        .login-link a {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.3s;
        }

        .login-link a:hover {
            color: var(--primary);
        }

        .success-message {
            display: none;
            background: rgba(0, 240, 255, 0.15);
            border: 1px solid rgba(0, 240, 255, 0.5);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            color: var(--accent);
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
        }

        .success-message i {
            margin-right: 0.5rem;
            color: var(--accent);
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.7);
        }

        .instructions {
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        /* ===== PASSWORD CHECKLIST ===== */

        .password-checklist {
            margin-top: 10px;
            font-size: 0.85rem;
        }

        .password-checklist p {
            margin: 4px 0;
            color: var(--gray);
            transition: all 0.3s ease;
        }

        /* ❌ Default */
        .password-checklist p.invalid {
            color: #FF4D4D;
        }

        /* ✔ Valid */
        .password-checklist p.valid {
            color: #00F0FF;
            text-shadow: 0 0 6px rgba(0, 240, 255, 0.7);
        }

        @media (max-width: 576px) {
            .register-container {
                padding: 2rem 1.5rem;
            }

            .logo img {
                height: 60px;
            }

            .logo h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="register-container">
        <div class="logo">
            <img src="logo.png" alt="Hanuman Sports Logo">
            <h1>Hanuman Sports</h1>
            <p>Mysore's Premier Sports Destination</p>
        </div>
        <!-- ── INLINE SUCCESS MESSAGE ── -->
        <div class="success-message" id="successMessage">
            <div class="success-icon-wrap">
                <i class="fas fa-check-circle"></i>
            </div>
            <h3>Registration Successful!</h3>
            <p>Your account has been created.<br>Redirecting you to your profile…</p>
            <div class="redirect-bar">
                <div class="redirect-bar-fill" id="redirectBar"></div>
            </div>
        </div>
        <div class="success-message" id="warningMessage" style="display:none; border-color:#FF4D4D; color:#FF4D4D;">
        </div>

        <form id="registerForm">
            <!-- Row 1 -->
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="firstName" name="firstname" required>
                        <i class="fas fa-user"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="lastName" name="lastname" required>
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>

            <!-- Row 2 -->
            <div class="form-row">
                <div class="form-group full-width">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>
            </div>

            <!-- Row 3 -->
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" required>
                    <i class="fas fa-eye toggle-password"></i>
                </div>
            </div>

            <!-- ✅ checklist BELOW (no extra input) -->
            <div class="password-checklist-wrapper">
                <div class="password-checklist">
                    <p id="rule-length">❌ At least 6 characters</p>
                    <p id="rule-uppercase">❌ One uppercase letter</p>
                    <p id="rule-number">❌ One number</p>
                    <p id="rule-special">❌ One special character</p>
                </div>
            </div>

            <!-- Row 4 -->
            <div class="form-row">
                <div class="form-group full-width">
                    <label>Phone Number</label>
                    <div class="input-wrapper">
                        <input type="tel" id="phone" name="phone" required>
                        <i class="fas fa-phone"></i>
                    </div>
                </div>
            </div>

            <div class="terms">
                <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                <label for="agreeTerms">I agree to the <a href="terms.html">Terms of Service</a> and <a
                        href="privacy.html">Privacy Policy</a></label>
            </div>

            <button type="submit" class="btn">Create a New Account</button>

            <div class="login-link">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </form>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const registerForm = document.getElementById("registerForm");
            const successMsg = document.getElementById("successMessage");

            if (!registerForm) {
                console.error("Form 'registerForm' not found in HTML!");
                return;
            }

            // 1. Safe Password Toggle
            document.querySelectorAll('.toggle-password').forEach(toggle => {
                toggle.onclick = function () {
                    const input = this.previousElementSibling;
                    if (input) {
                        input.type = input.type === 'password' ? 'text' : 'password';
                        this.classList.toggle('fa-eye');
                        this.classList.toggle('fa-eye-slash');
                    }
                };
            });

            // 2. Main Submission
            registerForm.onsubmit = async function (e) {
                e.preventDefault();

                try {
                    // Use optional chaining to prevent crashes if an ID is typo'd
                    const fName = document.getElementById('firstName')?.value || "";
                    const lName = document.getElementById('lastName')?.value || "";
                    const email = document.getElementById('email')?.value || "";
                    const phone = document.getElementById('phone')?.value || "";
                    const pass = document.getElementById('password')?.value || "";
                    const confirmPass = document.getElementById('confirmPassword')?.value || "";

                    if (pass !== confirmPass) {
                        alert("Passwords do not match!");
                        return;
                    }

                    const response = await fetch('http://localhost:3000/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: `${fName} ${lName}`.trim(),
                            email,
                            password: pass,
                            phone
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        registerForm.style.display = 'none';
                        if (successMsg) successMsg.style.display = 'block';
                        setTimeout(() => { window.location.href = "login.html"; }, 2500);
                    } else {
                        alert("Server says: " + (data.message || "Registration failed"));
                    }
                } catch (error) {
                    console.error("Network Error:", error);
                    alert("Connection Refused. Start your 'node server.js' first!");
                }
            };
        });

        const password = document.getElementById("password");

        const ruleLength = document.getElementById("rule-length");
        const ruleUpper = document.getElementById("rule-uppercase");
        const ruleNumber = document.getElementById("rule-number");
        const ruleSpecial = document.getElementById("rule-special");

        password.addEventListener("input", () => {
            const value = password.value;

            // Length
            if (value.length >= 6) {
                ruleLength.classList.add("valid");
                ruleLength.classList.remove("invalid");
                ruleLength.textContent = "✔ At least 6 characters";
            } else {
                ruleLength.classList.add("invalid");
                ruleLength.classList.remove("valid");
                ruleLength.textContent = "❌ At least 6 characters";
            }

            // Uppercase
            if (/[A-Z]/.test(value)) {
                ruleUpper.classList.add("valid");
                ruleUpper.classList.remove("invalid");
                ruleUpper.textContent = "✔ One uppercase letter";
            } else {
                ruleUpper.classList.add("invalid");
                ruleUpper.classList.remove("valid");
                ruleUpper.textContent = "❌ One uppercase letter";
            }

            // Number
            if (/[0-9]/.test(value)) {
                ruleNumber.classList.add("valid");
                ruleNumber.classList.remove("invalid");
                ruleNumber.textContent = "✔ One number";
            } else {
                ruleNumber.classList.add("invalid");
                ruleNumber.classList.remove("valid");
                ruleNumber.textContent = "❌ One number";
            }

            // Special char
            if (/[^A-Za-z0-9]/.test(value)) {
                ruleSpecial.classList.add("valid");
                ruleSpecial.classList.remove("invalid");
                ruleSpecial.textContent = "✔ One special character";
            } else {
                ruleSpecial.classList.add("invalid");
                ruleSpecial.classList.remove("valid");
                ruleSpecial.textContent = "❌ One special character";
            }
        });
    </script>
</body>

</html>
