<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Loading | Hanuman Sports</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0A0E17, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Floating Background Elements */
        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-element {
            position: absolute;
            border-radius: 50%;
            background: rgba(0, 240, 255, 0.1);
            filter: blur(40px);
            animation: float 15s infinite linear;
        }

        .floating-element:nth-child(1) {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 5%;
            animation-duration: 20s;
        }

        .floating-element:nth-child(2) {
            width: 400px;
            height: 400px;
            bottom: 15%;
            right: 10%;
            animation-delay: 3s;
            animation-duration: 25s;
        }

        .floating-element:nth-child(3) {
            width: 250px;
            height: 250px;
            top: 50%;
            left: 30%;
            animation-delay: 5s;
            animation-duration: 18s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            50% {
                transform: translate(30vw, 30vh) rotate(180deg);
            }

            100% {
                transform: translate(0, 0) rotate(360deg);
            }
        }

        .loader-container {
            text-align: center;
            animation: fadeIn 1.5s ease-in-out;
            position: relative;
            z-index: 10;
        }

        .logo {
            perspective: 1200px;
            margin-bottom: 20px;
        }

        .logo i {
            font-size: 120px;
            background: linear-gradient(135deg, #00F0FF, #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px #00F0FF);
            animation: rotateHorizontal 3s infinite linear;
            transform-style: preserve-3d;
            display: inline-block;
        }

        @keyframes rotateHorizontal {
            0% {
                transform: rotateY(0deg);
            }

            100% {
                transform: rotateY(360deg);
            }
        }

        .logo h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            letter-spacing: 2px;
            background: linear-gradient(to right, #00F0FF, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 15px 0 10px;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
        }

        .loading-text {
            font-size: 14px;
            color: #ccc;
            letter-spacing: 4px;
            margin-bottom: 25px;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
        }

        .loading-text::after {
            content: '...';
            position: absolute;
            animation: dots 1.5s steps(4, end) infinite;
            width: 24px;
            text-align: left;
            margin-left: 5px;
        }

        .hs-logo {
            width: 120px;
            height: auto;
            filter: drop-shadow(0 0 20px #00F0FF);
            animation: rotateHorizontal 3s infinite linear;
            transform-style: preserve-3d;
        }

        @keyframes dots {

            0%,
            20% {
                content: '';
            }

            40% {
                content: '.';
            }

            60% {
                content: '..';
            }

            80%,
            100% {
                content: '...';
            }
        }

        /* Progress bar */
        .progress-bar {
            width: 280px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            margin: auto;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            position: relative;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00F0FF, #ffffff, #00F0FF);
            background-size: 200% 100%;
            animation: load 3s linear forwards, gradientMove 1s linear infinite;
            border-radius: 20px;
            box-shadow: 0 0 20px #00F0FF;
        }

        @keyframes load {
            100% {
                width: 100%;
            }
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 0%;
            }

            100% {
                background-position: 200% 0%;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Percentage counter */
        .percentage {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: #00F0FF;
            margin-top: 20px;
            text-shadow: 0 0 15px #00F0FF;
            opacity: 0;
            animation: showPercentage 0.5s forwards 2.5s;
        }

        @keyframes showPercentage {
            to {
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .logo i {
                font-size: 90px;
            }

            .logo h1 {
                font-size: 22px;
            }

            .progress-bar {
                width: 220px;
            }
        }
    </style>
</head>

<body>
    <!-- Floating Background Elements -->
    <div class="floating-elements">
        <div class="floating-element"></div>
        <div class="floating-element"></div>
        <div class="floating-element"></div>
    </div>

    <div class="loader-container">
        <div class="logo">
            <img src="logo.png" alt="Hanuman Sports Logo" class="hs-logo">
            <h1>HANUMAN SPORTS</h1>
        </div>

        <div class="loading-text">LOADING</div>

        <div class="progress-bar">
            <div class="progress"></div>
        </div>

        <div class="percentage" id="percentage">100%</div>
    </div>

    <script>
        // Update percentage text
        const percentageEl = document.getElementById('percentage');
        let progress = 0;

        const interval = setInterval(() => {
            progress += 1;
            if (progress <= 100) {
                percentageEl.textContent = progress + '%';
            } else {
                clearInterval(interval);
            }
        }, 30);

        // Redirect after loading
        setTimeout(() => {
            window.location.href = "index.html"; // change if needed
        }, 3000);
    </script>

</body>

</html>
