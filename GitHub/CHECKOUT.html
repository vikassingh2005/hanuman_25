<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Hanuman Sports</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary:#FF6B00;
            --secondary:#0A0E17;
            --white:#fff;
            --light:#f8f9fa;
            --glass:rgba(255,255,255,0.1);
            --glass-border:rgba(255,255,255,0.2);
        }

        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
        body{background:var(--secondary);color:var(--light)}

        h1,h2,h3{font-family:'Orbitron',sans-serif}

        .checkout-section{max-width:1200px;margin:auto;padding:3rem 1rem}
        .checkout-title{text-align:center;margin-bottom:2rem}

        .checkout-container{
            display:grid;
            grid-template-columns:1fr 380px;
            gap:2rem
        }

        @media(max-width:900px){
            .checkout-container{grid-template-columns:1fr}
        }

        .checkout-form,.order-summary{
            background:var(--glass);
            border:1px solid var(--glass-border);
            border-radius:15px;
            padding:2rem;
            backdrop-filter:blur(10px)
        }

        .form-section{margin-bottom:2rem}
        .form-section-title{
            display:flex;
            align-items:center;
            gap:1rem;
            margin-bottom:1rem;
            border-bottom:1px solid var(--glass-border);
            padding-bottom:.5rem
        }

        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
        @media(max-width:600px){.form-row{grid-template-columns:1fr}}

        label{display:block;margin-bottom:.4rem}
        input,select{
            width:100%;
            padding:.8rem;
            border-radius:8px;
            border:1px solid var(--glass-border);
            background:rgba(255,255,255,.1);
            color:white
        }

        input:focus,select:focus{outline:none;border-color:var(--primary)}

        .payment-methods{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:1rem;
            margin-bottom:1rem
        }

        .payment-method{
            text-align:center;
            padding:1rem;
            border-radius:8px;
            border:1px solid var(--glass-border);
            cursor:pointer
        }

        .payment-method.active{
            border-color:var(--primary);
            background:rgba(255,107,0,.1)
        }

        .btn{
            width:100%;
            padding:1rem;
            background:var(--primary);
            border:none;
            border-radius:30px;
            color:white;
            font-weight:600;
            cursor:pointer;
            margin-top:1rem
        }

        .order-summary-title{margin-bottom:1rem}

        .order-summary-line,.order-summary-total{
            display:flex;
            justify-content:space-between;
            margin:.6rem 0
        }

        .order-summary-total{
            border-top:1px solid var(--glass-border);
            padding-top:1rem;
            font-weight:bold
        }
    </style>
</head>

<body>

<section class="checkout-section">

    <div class="checkout-title">
        <h1>Secure Checkout</h1>
        <p>Complete your purchase safely</p>
    </div>

    <div class="checkout-container">

        <!-- ✅ FORM START -->
        <form class="checkout-form" id="checkout-form">

            <!-- Shipping -->
            <div class="form-section">
                <div class="form-section-title">
                    <i class="fas fa-truck"></i><h3>Shipping Information</h3>
                </div>

                <div class="form-row">
                    <div>
                        <label>First Name</label>
                        <input type="text" required>
                    </div>
                    <div>
                        <label>Last Name</label>
                        <input type="text" required>
                    </div>
                </div>

                <label>Email</label>
                <input type="email" required>

                <label>Phone</label>
                <input type="tel" pattern="[0-9]{10}" required>

                <label>Address</label>
                <input type="text" required>

                <div class="form-row">
                    <input type="text" placeholder="City" required>
                    <input type="text" placeholder="State" required>
                </div>

                <div class="form-row">
                    <input type="text" placeholder="ZIP Code" inputmode="numeric" required>
                    <select required>
                        <option value="">Country</option>
                        <option selected>India</option>
                    </select>
                </div>
            </div>

            <!-- Payment -->
            <div class="form-section">
                <div class="form-section-title">
                    <i class="fas fa-credit-card"></i><h3>Payment Method</h3>
                </div>

                <div class="payment-methods">
                    <div class="payment-method active" data-method="card">Card</div>
                    <div class="payment-method" data-method="upi">UPI</div>
                    <div class="payment-method" data-method="paypal">PayPal</div>
                </div>

                <!-- Card -->
                <div id="card-form">
                    <input type="text" placeholder="Card Number" required>
                    <div class="form-row">
                        <input type="text" placeholder="MM/YY" required>
                        <input type="text" placeholder="CVV" required>
                    </div>
                </div>

                <!-- UPI -->
                <div id="upi-form" style="display:none">
                    <input type="text" id="upi-id" placeholder="yourname@upi">
                </div>
            </div>

            <button class="btn" type="submit">Place Order</button>

        </form>
        <!-- ✅ FORM END -->

        <!-- Order Summary -->
        <div class="order-summary">
            <h2 class="order-summary-title">Order Summary</h2>
            <div class="order-summary-line"><span>Subtotal</span><span>₹7,797</span></div>
            <div class="order-summary-line"><span>Shipping</span><span>₹200</span></div>
            <div class="order-summary-line"><span>Tax</span><span>₹780</span></div>
            <div class="order-summary-total"><span>Total</span><span>₹8,777</span></div>
        </div>

    </div>
</section>

<script>
    const methods=document.querySelectorAll('.payment-method');
    const card=document.getElementById('card-form');
    const upi=document.getElementById('upi-form');
    const upiInput=document.getElementById('upi-id');

    methods.forEach(m=>{
        m.onclick=()=>{
            methods.forEach(x=>x.classList.remove('active'));
            m.classList.add('active');

            if(m.dataset.method==="upi"){
                upi.style.display="block";
                card.style.display="none";
                upiInput.required=true;
            }else{
                upi.style.display="none";
                card.style.display="block";
                upiInput.required=false;
            }
        }
    });

    document.getElementById('checkout-form').onsubmit=e=>{
        e.preventDefault();
        alert("Order placed successfully!");
    }
</script>

</body>
</html>
